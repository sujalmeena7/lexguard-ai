<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexGuard AI - DPDP 2023 Compliance Engine</title>
  <meta name="description" content="Enterprise-grade AI auditor that transforms dense legal agreements into actionable DPDP 2023 risk scores in seconds." />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <script>
    window.__LEXGUARD_BACKEND__ = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:8000'
      : 'https://lexguard-backend-3mmj.onrender.com';
    window.ENV_DASHBOARD_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:8501/'
      : 'https://lexguard-ai-a8kv79qhvngwsute9api2n.streamlit.app/';
    // Fetch Supabase config from backend at runtime — never hardcode keys in HTML
    // Expose a promise so consumers can await readiness before using ENV_* globals
    window.__LEXGUARD_CONFIG_READY__ = fetch(window.__LEXGUARD_BACKEND__ + '/api/config')
      .then(r => {
        if (!r.ok) throw new Error('Config fetch failed: HTTP ' + r.status);
        return r.json();
      })
      .then(cfg => {
        if (cfg.supabase_url && cfg.supabase_anon_key) {
          window.ENV_SUPABASE_URL = cfg.supabase_url;
          window.ENV_SUPABASE_ANON_KEY = cfg.supabase_anon_key;
        }
      })
      .catch(err => {
        console.error('[LexGuard] Failed to load Supabase config:', err);
        // Always resolve (never reject) so awaiting code doesn't hang
      });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/index.js"></script>
</body>
</html>
